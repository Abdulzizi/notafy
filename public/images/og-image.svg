<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0e"/>
  <!-- Subtle gradient accent -->
  <radialGradient id="glow" cx="50%" cy="60%" r="55%">
    <stop offset="0%" stop-color="#c8b89a" stop-opacity="0.07"/>
    <stop offset="100%" stop-color="#c8b89a" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Logo circle -->
  <circle cx="600" cy="230" r="56" fill="#c8b89a"/>
  <text x="600" y="230" font-family="'Arial Black','Arial',sans-serif" font-weight="900" font-size="56" fill="#0c0c0e" text-anchor="middle" dominant-baseline="central">N</text>
  <!-- App name -->
  <text x="600" y="330" font-family="Georgia,'Times New Roman',serif" font-size="64" font-weight="400" fill="#e8e8f0" text-anchor="middle" letter-spacing="-1">Notafy</text>
  <!-- Tagline -->
  <text x="600" y="400" font-family="'Arial',sans-serif" font-size="26" font-weight="300" fill="#888896" text-anchor="middle">Extract receipts instantly with AI</text>
  <!-- Bottom accent line -->
  <rect x="480" y="460" width="240" height="2" rx="1" fill="#c8b89a" opacity="0.4"/>
</svg>
